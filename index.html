<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vellune-v.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Elastic. Luminous. Eternal. - Vellune crafts rare chocolate expressions for those who taste the difference." />
    <meta name="theme-color" content="#0F0A09" />
    <title>Vellune - Luxury Chocolate Maison</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garant:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Cormorant+SC:wght@300;400;500&family=Cormorant+Infant:ital,wght@1,300;1,400&family=Montserrat:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <script>
      (function(l){
        if(l.search[1]==='/' ){
          var decoded=l.search.slice(1).split('&').map(function(s){return s.replace(/~and~/g,'&')});
          window.history.replaceState(null,null,
            l.pathname.slice(0,-1)+decoded[0]+(decoded[1]?'&'+decoded[1].slice(1):'')+(l.hash||'')
          );
        }
      }(window.location))
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
